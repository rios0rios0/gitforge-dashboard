name: 'default'

on:
  push:
    branches:
      - 'main'
    tags:
      - '*'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

permissions:
  security-events: 'write' # security-sast_codeql
  contents: 'write' # delivery-release
  pull-requests: 'write' # tests-test_all (coverage report comment)
  checks: 'write' # tests-test_all (test results annotations)
  pages: 'write' # deploy (GitHub Pages)
  id-token: 'write' # deploy (GitHub Pages OIDC)

jobs:
  default:
    uses: 'rios0rios0/pipelines/.github/workflows/javascript.yaml@main'
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}

  deploy:
    runs-on: 'ubuntu-latest'
    needs: ['default']
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main'"
    environment:
      name: 'github-pages'
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      - name: 'Enable Corepack'
        run: 'corepack enable'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20'
          cache: 'yarn'

      - name: 'Install and build'
        run: |
          yarn install --immutable
          yarn build

      - name: 'Setup Pages'
        uses: 'actions/configure-pages@v5'

      - name: 'Upload artifact'
        uses: 'actions/upload-pages-artifact@v3'
        with:
          path: 'dist'

      - id: 'deployment'
        name: 'Deploy to GitHub Pages'
        uses: 'actions/deploy-pages@v4'
